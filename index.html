<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="0; url=./brasil_transparente_painel_bandeira.html" />
<title>Brasil Transparente</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    display:grid;place-items:center;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:
      radial-gradient(circle at 7% 0%,rgba(0,156,59,.10),transparent 30%),
      radial-gradient(circle at 90% 0%,rgba(0,39,118,.10),transparent 28%),
      radial-gradient(circle at 50% -12%,rgba(255,223,0,.16),transparent 25%),
      #F7F9FC;
    color:#0B1220;
    padding:24px;
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }
  .card{
    background:rgba(255,255,255,.96);
    border:1px solid #E2E8F0;
    border-radius:24px;
    box-shadow:0 18px 45px rgba(15,23,42,.07);
    padding:48px 40px;
    max-width:520px;width:100%;
    text-align:center;
  }
  .flag{
    width:88px;height:88px;border-radius:24px;
    background:linear-gradient(135deg,#009C3B 0%,#047333 50%,#002776 100%);
    margin:0 auto 24px;position:relative;
    box-shadow:0 12px 28px rgba(0,156,59,.25);
    display:grid;place-items:center;
  }
  .flag::before{
    content:"";width:46px;height:46px;
    background:#FFDF00;
    transform:rotate(45deg);
    border-radius:6px;
    position:absolute;
  }
  .flag::after{
    content:"";width:22px;height:22px;
    background:#002776;
    border-radius:50%;
    position:absolute;
    border:3px solid #fff;
  }
  h1{
    font-family:Manrope,Inter,sans-serif;
    font-size:30px;letter-spacing:-.03em;
    line-height:1.1;margin-bottom:8px;
    color:#0B1220;
  }
  .sub{
    color:#64748B;font-size:14px;line-height:1.55;
    margin-bottom:28px;
  }
  .spinner{
    display:inline-block;width:18px;height:18px;
    border:2px solid rgba(0,156,59,.2);
    border-top-color:#009C3B;
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin-right:8px;vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .lead{
    color:#475569;font-size:14px;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:24px;
  }
  .cta{
    display:inline-flex;align-items:center;gap:8px;
    background:#009C3B;color:#fff;
    padding:13px 22px;border-radius:999px;
    font-size:14px;font-weight:800;
    text-decoration:none;
    transition:.18s;font-family:inherit;border:0;
    box-shadow:0 8px 20px rgba(0,156,59,.25);
  }
  .cta:hover{background:#047333;transform:translateY(-1px)}
  .meta{
    margin-top:24px;padding-top:20px;
    border-top:1px solid #E2E8F0;
    font-size:12px;color:#64748B;line-height:1.6;
  }
  .meta b{color:#0B1220}
  .meta a{color:#002776;text-decoration:none;font-weight:700}
  .meta a:hover{text-decoration:underline}
</style>
</head>
<body>
<main class="card">
  <div class="flag" aria-hidden="true"></div>
  <h1>Brasil Transparente</h1>
  <p class="sub">O dinheiro público explicado sem economês · Dados oficiais com rastreabilidade total</p>
  <p class="lead"><span class="spinner" aria-hidden="true"></span>Carregando o painel…</p>
  <a class="cta" href="./brasil_transparente_painel_bandeira.html">Abrir painel →</a>
  <div class="meta">
    <b>v1.3</b> · Snapshot oficial <b>Siconfi RREO 2023 P6</b><br>
    <a href="https://github.com/speedvarginha-coder/brasil-transparente" target="_blank" rel="noopener">github.com/speedvarginha-coder/brasil-transparente</a> ·
    <a href="./CHANGELOG.md" target="_blank">CHANGELOG</a> ·
    <a href="./roadmap.md" target="_blank">Roadmap</a>
  </div>
</main>
<script>
  // Fallback se meta refresh não funcionar (raro, mas acontece em alguns browsers)
  setTimeout(function(){window.location.href='./brasil_transparente_painel_bandeira.html';},1500);
</script>
</body>
</html>
